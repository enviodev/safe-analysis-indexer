# Global statistics - single entity with id "global"
type GlobalStats {
  id: ID! # "global"
  totalSafes: Int!
  totalTransactions: Int!
  totalModuleTransactions: Int!
}

# Per-network statistics
type Network {
  id: ID! # chainId as string
  numberOfSafes: Int!
  numberOfTransactions: Int!
  numberOfModuleTransactions: Int!
  safeTransactions: [SafeTransaction!]! @derivedFrom(field: "network")
  safeModuleTransactions: [SafeModuleTransaction!]!
    @derivedFrom(field: "network")
}

# Per-version statistics
type Version {
  id: ID! # version string (e.g., "V1_3_0")
  numberOfSafes: Int!
  numberOfTransactions: Int!
  numberOfModuleTransactions: Int!
}

type Safe {
  id: ID! # chainId-address
  creationTxHash: String! @index
  creationTimestamp: BigInt! @index
  blockCreationNum: Int! @index # creation block number — set by ProxyCreation; SafeSetup-first seeds it, ProxyCreation overrides if it fires later in the same tx
  factoryAddress: String @index # factory contract that emitted ProxyCreation; null for SafeSetup-first orphans where ProxyCreation never arrived
  setupData: String # raw setup() initializer bytes (the `initializer` arg to the factory's `createProxyWithNonce`). For pre-1.3.0 we fetch it from the setup trace. For modern (1.3.0+) we ABI-decode `tx.input` of the deployment tx as `createProxyWithNonce(address,bytes,uint256)` and take param 1 — same approach Safe Transaction Service uses (`safe_service.py` → `_decode_proxy_factory`). Stays null for wrapped deployments where `tx.to` isn't the factory directly (MultiSend, Gelato Relay, ERC-4337 `handleOps`, …) — those wrappers can be peeled incrementally.
  address: String! @index
  chainId: Int! @index
  owners: [String!]!
  threshold: Int!
  version: String @index # Safe Transaction Service-compatible version string: "1.3.0" / "1.3.0+L2" / "1.4.1" / "1.4.1+L2" / "1.5.0" / "1.5.0+L2" / "1.2.0" / "1.1.1" / "1.0.0" / etc. The "+L2" suffix marks SafeL2.sol-variant master copies (which emit SafeMultiSigTransaction events). `null` when masterCopy is not in our known set — matches Safe Transaction Service's nullable `version` field. Indexed for "Safes by version" lookups. Derived directly from `masterCopy` via `MASTER_COPY_TO_STS_VERSION` (see consts.ts); pre-1.3.0 versions without a known masterCopy use an enum→string fallback table.
  masterCopy: String # nullable - the singleton/master copy address if known
  fallbackHandler: String # nullable - 1.3.0+ set on SafeSetup, mutated by ChangedFallbackHandler. Pre-1.3.0 derived from initializer when v1.1.1+ ABI; null for v0.x/v1.0.0 (no fallbackHandler param). "Legacy, unknown" — left null when undecidable.
  guard: String! # transaction guard contract. Always defaults to 0x000…000 (no guard) on creation; mutated by ChangedGuard / ChangedGuardV4 on v1.3.0+ Safes. Pre-1.3.0 versions have no guard concept and remain at the zero address.
  moduleGuard: String! # module-execution guard contract. Always defaults to 0x000…000. Mutated by `ChangedModuleGuard(address indexed moduleGuard)` (v1.5.0+ only — earlier versions have no moduleGuard concept and remain at the zero address). Matches Safe Transaction Service's `moduleGuard` field on `/safes/{address}/`.
  modules: [SafeModule!]! @derivedFrom(field: "safe") # enabled modules. Defaults to [] on creation; mutated by EnabledModule / DisabledModule (and indexed v1.4.0+ variants).
  safeOwners: [SafeOwner!]! @derivedFrom(field: "safe")
  initializer: String!
  safeTransactions: [SafeTransaction!]! @derivedFrom(field: "safe")
  safeModuleTransactions: [SafeModuleTransaction!]! @derivedFrom(field: "safe")
  numberOfSuccessfulExecutions: Int!
  numberOfFailedExecutions: Int!
  nonce: BigInt! # Safe's internal execution counter. BigInt rather than Int so Hasura serializes it as a decimal string (matching Safe Transaction Service `nonce` shape, and giving full uint256 precision). Incremented exactly once per ExecutionSuccess/ExecutionFailure.
  totalGasSpent: BigInt!
  creationTxFrom: String! @index # `tx.from` of the deployment transaction. For directly-submitted deployments this IS the user who created the Safe — matches Safe Transaction Service `creator`. For sponsored deployments (ERC-4337 bundlers via EntryPoint, Gelato/Pimlico relayers, Safe Relay, …) this is the bundler/relayer EOA paying gas, NOT the end user. Lowercase. Indexed so "Safes created by tx-sender X" is a fast lookup. See `creator` for the trace-walked, Safe-TX-Service-compatible field.
  creator: String! @index # The address that directly called the factory's `createProxyWithNonce` — matches Safe Transaction Service `creator` semantics (`safe_service.py:132`: `creator = (parent_internal_tx or creation_ethereum_tx)._from`). Resolved by walking the deployment tx's trace tree to find the CREATE frame for this Safe, then returning its parent frame's `from`. For direct deployments this equals `creationTxFrom` (= `tx.from` = user EOA). For 4337 deployments via EntryPoint v0.7 this is the SenderCreator contract (`0xefc2c1444ebcc4db75e7613d20c6a62ff67a167c`, deterministic across chains). For Gelato Relay it's Gelato's router contract. For MultiSend it's MultiSend. Note: this is NOT the user EOA for wrapped deployments — Safe TX Service has the same limitation. **Trace lookup runs on chains in `CREATOR_TRACE_CHAINS` (Ethereum mainnet + Gnosis today); all other chains fall back to `creationTxFrom`** — matches Safe TX Service's behavior on chains they treat as L2 (simulated traces, no real trace data). Lowercase, indexed.
  counted: Boolean! # Has this Safe been counted in Global/Network/Version stats yet? Flipped to true exactly once, on the canonical counting event (ProxyCreation, in either branch of handleModernProxyCreation / the pre-1.3.0 handler). Stays false for stubs (ensureSafeStub) and SafeSetup-only orphans whose ProxyCreation never arrived — including RPC-backfilled orphans where masterCopy/version are resolved via eth_getStorageAt but ProxyCreation is still missing. ChangedMasterCopy and similar Version-stats-mutating events guard on this flag so they don't touch counters for Safes that were never counted in the first place.
}

type Owner {
  id: ID! # owner address
  safes: [String!]!
  safeOwners: [SafeOwner!]! @derivedFrom(field: "owner")
}

type SafeOwner {
  id: ID! # ownerAddress-safeId
  owner: Owner! @index
  safe: Safe! @index
}

# Currently-enabled module on a Safe. Row exists iff the module is enabled;
# disabling the module deletes the row. Created by EnabledModule (+ V4),
# removed by DisabledModule (+ V4). The same module can be re-enabled later
# and we treat that as the same row (id is deterministic).
type SafeModule {
  id: ID! # chainId-safeAddress-moduleAddress
  safe: Safe! @index
  module: String! @index
  chainId: Int! @index
  enabledAtBlock: Int!
  enabledAtTimestamp: BigInt!
  enabledTxHash: String!
}

type SafeModuleTransaction {
  id: ID!
  safe: Safe! @index
  network: Network! @index
  chainId: Int! @index
  safeModule: String!
  to: String!
  value: BigInt!
  data: String!
  operation: BigInt!
  txHash: String! @index
  timestamp: BigInt! @index
  blockNumber: Int! @index # execution block number — enables ordering / "since block X" filtering
}

type SafeTransaction {
  id: ID! # safeId-nonce (e.g. "1-0xabc...-42")
  safe: Safe! @index
  network: Network! @index
  chainId: Int! @index
  to: String!
  value: BigInt!
  data: String!
  operation: BigInt!
  safeTxGas: BigInt!
  baseGas: BigInt!
  gasPrice: BigInt!
  gasToken: String!
  refundReceiver: String!
  signatures: String!
  nonce: BigInt!
  msgSender: String!
  threshold: Int!
  executionDate: BigInt! @index
  txHash: String! @index # on-chain transaction hash
  safeTxHash: String @index # EIP-712 safe-tx hash (the key Safe Transaction Service uses). Null until ExecutionSuccess/Failure fires — the SafeMultiSigTransaction event doesn't carry it, so it's set when execution lands.
  blockNumber: Int! @index # execution block number — enables ordering / "since block X" filtering
  success: Boolean # null until ExecutionSuccess/Failure fires
}

# ERC20 Transfer events whose `from` or `to` matches a discovered Safe address.
# Wired as a wildcard event (fires across any token contract) with HyperSync
# topic1/topic2 filtering against the live Safe address pool — the pool is
# auto-partitioned at 5000 addresses per HyperSync request by HyperIndex.
type ERC20Transfer {
  id: ID! # chainId_blockNumber_logIndex
  chainId: Int! @index
  blockNumber: Int! @index
  blockTimestamp: BigInt! @index
  txHash: String! @index
  logIndex: Int!
  token: String! @index
  from: String! @index
  to: String! @index
  value: BigInt!
}

# Running ERC20 balance for a (Safe, token) pair, derived from ERC20Transfer
# in/out flow. Updated transactionally inside the Transfer handler.
# Note: balance is the *raw* on-chain integer (no decimals applied) so the
# UI must format with the token's decimals from the token-list lookup.
type SafeTokenBalance {
  id: ID! # chainId-safeAddress-tokenAddress
  chainId: Int! @index
  safeAddress: String! @index
  token: String! @index
  balance: BigInt!
  inboundCount: Int!
  outboundCount: Int!
  lastUpdatedBlock: Int!
  lastUpdatedTimestamp: BigInt!
}
