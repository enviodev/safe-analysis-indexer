name: integration

# Live cross-reference suite. Not on push or pull_request — manual only, since
# it hits two third-party endpoints (Safe Transaction Service + our hosted
# Envio indexer) and shouldn't block PRs on external flakiness.
on:
  workflow_dispatch:
    inputs:
      chains:
        description: "Comma-separated chain IDs (e.g. 1,100)"
        required: false
        default: "1,100"
      sample_size:
        description: "Safes to sample per chain"
        required: false
        default: "10"
      indexer_endpoint:
        description: "Indexer GraphQL endpoint (required — no default; deployment hashes rotate)"
        required: true

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.1.0
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm codegen

      - name: Run cross-reference suite
        env:
          INTEGRATION_CHAINS: ${{ inputs.chains }}
          INTEGRATION_SAMPLE_SIZE: ${{ inputs.sample_size }}
          INTEGRATION_INDEXER_ENDPOINT: ${{ inputs.indexer_endpoint }}
        run: pnpm test:integration
