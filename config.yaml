# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: envio-indexer
storage:
  postgres: true
  clickhouse: false
contracts:
  - name: GnosisSafeProxyPre1_3_0
    handler: src/EventHandlers.ts
    events:
      - event: ProxyCreation(address proxy)
        field_selection:
          transaction_fields:
            - hash
  # Safe event signatures are the same in v1.0.0, v1.1.1, and v1.2.0
  - name: SafePre1_3_0
    handler: src/EventHandlers.ts
    events:
      - event: AddedOwner(address owner)
      - event: RemovedOwner(address owner)
      - event: ChangedThreshold(uint256 threshold)
  - name: GnosisSafeL2
    handler: src/EventHandlers.ts
    events:
      - event: SafeSetup(address indexed initiator, address[] owners, uint256 threshold, address initializer, address fallbackHandler)
        field_selection:
          transaction_fields:
            - hash
      - event: ExecutionSuccess(bytes32 txHash, uint256 payment)
        field_selection:
          transaction_fields:
            - hash
            - input
            - from
      - event: ExecutionSuccess(bytes32 indexed txHash, uint256 payment)
        name: ExecutionSuccessV4
        field_selection:
          transaction_fields:
            - hash
            - input
            - from
      - event: ExecutionFailure(bytes32 txHash, uint256 payment)
        field_selection:
          transaction_fields:
            - hash
            - input
            - from
      - event: ExecutionFailure(bytes32 indexed txHash, uint256 payment)
        name: ExecutionFailureV4
        field_selection:
          transaction_fields:
            - hash
            - input
            - from
      - event: ChangedMasterCopy(address singleton)
      - event: SafeMultiSigTransaction(address to, uint256 value, bytes data, uint8 operation, uint256 safeTxGas, uint256 baseGas, uint256 gasPrice, address gasToken, address refundReceiver, bytes signatures, bytes additionalInfo)
        field_selection:
          transaction_fields:
            - hash
      - event: SafeModuleTransaction(address module, address to, uint256 value, bytes data, uint8 operation)
        field_selection:
          transaction_fields:
            - hash
      - event: AddedOwner(address owner)
      - event: AddedOwnerV4(address indexed owner)
        name: AddedOwnerV4
      - event: RemovedOwner(address owner)
      - event: RemovedOwner(address indexed owner)
        name: RemovedOwnerV4
  - name: GnosisSafeProxy1_3_0
    handler: src/EventHandlers.ts
    events:
      - event: ProxyCreation(address proxy, address singleton)
        field_selection:
          transaction_fields:
            - hash
  - name: GnosisSafeProxy1_4_1
    handler: src/EventHandlers.ts
    events:
      - event: ProxyCreation(address indexed proxy, address singleton)
        field_selection:
          transaction_fields:
            - hash
  - name: GnosisSafeProxy1_5_0
    handler: src/EventHandlers.ts
    events:
      - event: ProxyCreation(address indexed proxy, address singleton)
        field_selection:
          transaction_fields:
            - hash
  # Wildcard ERC20 Transfer filtered to transfers touching a known Safe address.
  # Safe addresses are registered dynamically (see the ProxyCreation handlers),
  # and HyperIndex auto-partitions the address pool at 5000/partition before
  # pushing it down to HyperSync as a topic1/topic2 filter.
  # Pattern: https://docs.envio.dev/docs/HyperIndex/wildcard-indexing#assert-erc20-transfers-in-handler
  - name: SafeErc20Watcher
    handler: src/EventHandlers.ts
    events:
      - event: Transfer(address indexed from, address indexed to, uint256 value)
        field_selection:
          transaction_fields:
            - hash
  # Curated AMM pools used for on-chain USD pricing (see src/pricing/poolLookup.json,
  # generated by scripts/discover-pools.ts). Pool addresses are appended to each
  # chain's contracts list by scripts/generate-pool-config.ts after discovery.
  # Single Swap event signature covers Uniswap V3 + every fork (PancakeSwap V3,
  # FusionX V3, Thruster V3, HyperSwap V3, …).
  - name: UniswapV3Pool
    handler: src/AmmPricing.ts
    events:
      - event: Swap(address indexed sender, address indexed recipient, int256 amount0, int256 amount1, uint160 sqrtPriceX96, uint128 liquidity, int24 tick)
  # Sync emits the post-swap reserves on every state change for V2 pairs —
  # cleaner to consume than the Swap event for spot-price purposes.
  - name: UniswapV2Pair
    handler: src/AmmPricing.ts
    events:
      - event: Sync(uint112 reserve0, uint112 reserve1)
